<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Scanner Pro Industrial</title>

    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="./assets/exceljs.min.js"></script>

    <style>
        #reader {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
            position: relative
        }

        .scan-frame {
            position: absolute;
            inset: 0;
            border: 3px solid rgba(0, 255, 100, .8);
            pointer-events: none
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: #00ff88;
            animation: scan 2s linear infinite
        }

        @keyframes scan {
            0% {
                top: 0
            }

            100% {
                top: 100%
            }
        }

        .scan-success {
            animation: flash .3s
        }

        @keyframes flash {
            0% {
                background: rgba(0, 255, 0, .5)
            }

            100% {
                background: transparent
            }
        }

        .snapshot {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd
        }
    </style>

</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-white px-4 py-3 shadow flex justify-between items-center">

        <h1 class="text-xl font-black text-blue-600">SCANNER PRO</h1>

        <div class="flex gap-2">

            <button onclick="toggleManager()" class="bg-gray-200 px-3 py-2 rounded text-sm">
                管理记录
            </button>

            <button onclick="configColumns()" class="bg-gray-200 px-3 py-2 rounded text-sm">
                列名
            </button>

            <button onclick="exportXLSX()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">
                导出 (<span id="count">0</span>)
            </button>

        </div>

    </header>

    <section id="scannerSection" class="p-4">

        <div class="relative">

            <div id="reader">

                <div class="scan-frame"></div>
                <div class="scan-line"></div>

            </div>

            <div id="overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center text-white">
                <button onclick="startScanner()" class="bg-blue-500 p-5 rounded-full shadow-xl">▶</button>
            </div>

        </div>

        <div class="flex gap-2 mt-3">

            <button onclick="toggleTorch()" class="flex-1 bg-white py-2 rounded border text-sm">
                🔦 补光灯
            </button>

            <button onclick="clearAll()" class="flex-1 bg-white py-2 rounded border text-sm text-red-500">
                清空
            </button>

        </div>

    </section>

    <main id="managerSection" class="hidden flex-1 overflow-y-auto px-4 pb-10">

        <div id="list" class="space-y-2"></div>

    </main>

    <div id="preview" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
        <img id="previewImg" class="max-w-full max-h-full">
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>

        let scanner = null
        let scannerPaused = false

        let history = []
        let historyHash = {}

        let columnNames = []

        let db = null

        const SNAP_SIZE = 512
        const SCAN_DEBOUNCE = 300
        const PAUSE_TIME = 200

        let lastScan = 0
        let torch = false

        let zoom = 1
        let maxZoom = 1

        /* IndexedDB */

        function initDB() {

            return new Promise(res => {

                const req = indexedDB.open("scannerDB", 1)

                req.onupgradeneeded = e => {
                    db = e.target.result
                    db.createObjectStore("records", { keyPath: "id" })
                }

                req.onsuccess = e => {
                    db = e.target.result
                    res()
                }

            })

        }

        function saveItem(item) {

            db.transaction("records", "readwrite")
                .objectStore("records")
                .put(item)

        }

        function deleteItemDB(id) {

            db.transaction("records", "readwrite")
                .objectStore("records")
                .delete(id)

        }

        function clearDB() {

            db.transaction("records", "readwrite")
                .objectStore("records")
                .clear()

        }

        function loadDB() {

            return new Promise(res => {

                const req = db.transaction("records", "readonly")
                    .objectStore("records")
                    .getAll()

                req.onsuccess = () => {

                    history = req.result.sort((a, b) => b.id - a.id)

                    history.forEach(v => historyHash[v.code] = 1)

                    renderAll()

                    res()

                }

            })

        }

        /* UI切换 */

        function toggleManager() {

            const scannerUI = document.getElementById("scannerSection")
            const managerUI = document.getElementById("managerSection")

            if (managerUI.classList.contains("hidden")) {

                managerUI.classList.remove("hidden")
                scannerUI.classList.add("hidden")

                stopScanner()

            } else {

                managerUI.classList.add("hidden")
                scannerUI.classList.remove("hidden")

                startScanner()

            }

        }

        /* 摄像头 */

        function getTrack() {

            const v = document.querySelector("#reader video")

            if (!v || !v.srcObject) return null

            return v.srcObject.getVideoTracks()[0]

        }

        /* 启动扫描 */

        async function startScanner() {

            if (scanner) return

            document.getElementById("overlay").style.display = "none"

            scanner = new Html5Qrcode("reader")

            await scanner.start(
                { facingMode: "environment" },
                { fps: 30 },
                onScan
            )

            initZoom()

        }

        /* 停止扫描 */

        async function stopScanner() {

            if (!scanner) return

            await scanner.stop()

            scanner = null

        }

        /* 变焦 */

        function initZoom() {

            const track = getTrack()

            if (!track) return

            const cap = track.getCapabilities()

            if (cap.zoom) {

                maxZoom = cap.zoom.max

                const reader = document.getElementById("reader")

                let startDist = 0

                reader.addEventListener("touchstart", e => {

                    if (e.touches.length === 2) {

                        startDist = getDist(e)

                    }

                })

                reader.addEventListener("touchmove", e => {

                    if (e.touches.length === 2) {

                        const dist = getDist(e)

                        const delta = dist - startDist

                        zoom += delta * 0.01

                        zoom = Math.max(1, Math.min(maxZoom, zoom))

                        track.applyConstraints({ advanced: [{ zoom }] })

                        startDist = dist

                    }

                })

            }

        }

        function getDist(e) {

            const dx = e.touches[0].clientX - e.touches[1].clientX
            const dy = e.touches[0].clientY - e.touches[1].clientY

            return Math.sqrt(dx * dx + dy * dy)

        }

        /* 快照 */

        function captureSnapshot() {

            const video = document.querySelector("#reader video")

            if (!video) return null

            const canvas = document.createElement("canvas")

            canvas.width = SNAP_SIZE
            canvas.height = SNAP_SIZE

            const ctx = canvas.getContext("2d")

            const vw = video.videoWidth
            const vh = video.videoHeight

            const s = Math.min(vw, vh)

            const sx = (vw - s) / 2
            const sy = (vh - s) / 2

            ctx.drawImage(video, sx, sy, s, s, 0, 0, SNAP_SIZE, SNAP_SIZE)

            return canvas.toDataURL("image/jpeg", 0.9)

        }

        /* 扫码 */

        function onScan(text) {

            const now = Date.now()

            if (now - lastScan < SCAN_DEBOUNCE) return

            lastScan = now

            if (!text) return

            if (historyHash[text]) return

            historyHash[text] = 1

            if (scannerPaused) return

            scanner.pause(true)
            scannerPaused = true

            addRecord(text)

            feedback()

            document.getElementById("reader").classList.add("scan-success")

            setTimeout(() => {

                document.getElementById("reader").classList.remove("scan-success")

                scanner.resume()
                scannerPaused = false

            }, PAUSE_TIME)

        }

        /* 添加记录 */

        function addRecord(code) {

            const snapshot = captureSnapshot()

            const item = {
                id: Date.now(),
                code,
                snapshot
            }

            history.unshift(item)

            saveItem(item)

            prependDOM(item)

            updateCount()

        }

        /* DOM */

        function createRow(item, index) {

            const el = document.createElement("div")

            el.className = "bg-white p-3 rounded shadow flex items-center gap-2"

            el.dataset.id = item.id

            el.innerHTML = `

<div class="w-8 text-gray-400">${index + 1}</div>

<div class="flex flex-col">
<button onclick="moveItem('${item.id}',-1)">⬆</button>
<button onclick="moveItem('${item.id}',1)">⬇</button>
</div>

<img src="${item.snapshot}" class="snapshot" onclick="showPreview('${item.snapshot}')">

<div class="flex-1 font-mono truncate">${item.code}</div>

<button onclick="removeItem('${item.id}')" class="text-red-500">删</button>

`

            return el

        }

        function prependDOM(item) {

            renderAll()

        }

        /* 渲染 */

        function renderAll() {

            const list = document.getElementById("list")

            list.innerHTML = ""

            history.forEach((v, i) => {

                list.appendChild(createRow(v, i))

            })

            updateCount()

        }

        /* 删除 */

        function removeItem(id) {

            const item = history.find(v => v.id == id)

            if (!item) return

            history = history.filter(v => v.id != id)

            delete historyHash[item.code]

            deleteItemDB(item.id)

            renderAll()

        }

        /* 排序 */

        function moveItem(id, dir) {

            const i = history.findIndex(v => v.id == id)

            const ni = i - dir

            if (ni < 0 || ni >= history.length) return

            const t = history[i]

            history[i] = history[ni]
            history[ni] = t

            renderAll()

        }

        /* 预览 */

        function showPreview(src) {

            const p = document.getElementById("preview")

            document.getElementById("previewImg").src = src

            p.classList.remove("hidden")

            p.onclick = () => p.classList.add("hidden")

        }

        /* Torch */

        async function toggleTorch() {

            const track = getTrack()

            if (!track) return

            const cap = track.getCapabilities()

            if (!cap.torch) {

                alert("设备不支持")
                return

            }

            torch = !torch

            await track.applyConstraints({
                advanced: [{ torch }]
            })

        }

        /* Excel导出 */

        async function exportXLSX() {

            if (!history.length) return alert("无数据")

            let cols = ["序号"]

            cols = cols.concat(columnNames.length ? columnNames : ["内容"])

            cols.push("快照")

            const wb = new ExcelJS.Workbook()
            const ws = wb.addWorksheet("scan")

            ws.addRow(cols)

            let r = 2

            history.forEach((item, i) => {

                const row = ws.addRow([i + 1, item.code, ""])

                const img = wb.addImage({
                    base64: item.snapshot,
                    extension: "jpeg"
                })

                ws.addImage(img, {
                    tl: { col: cols.length - 1, row: r - 1 },
                    ext: { width: 40, height: 40 }
                })

                r++

            })

            const buf = await wb.xlsx.writeBuffer()

            const blob = new Blob([buf])

            const a = document.createElement("a")

            a.href = URL.createObjectURL(blob)
            a.download = "scan_export.xlsx"
            a.click()

        }

        /* 反馈 */

        function feedback() {

            document.getElementById("beep").play().catch(() => { })

            if (navigator.vibrate) navigator.vibrate(30)

        }

        /* 清空 */

        function clearAll() {

            if (!confirm("确定清空?")) return

            history = []
            historyHash = {}

            clearDB()

            renderAll()

        }

        /* 列名 */

        function configColumns() {

            const v = prompt("输入列名，用逗号分隔\n例：箱号,SKU,数量", columnNames.join(","))

            if (v === null) return

            columnNames = v.split(",").map(s => s.trim()).filter(Boolean)

            localStorage.setItem("scan_columns_v1", JSON.stringify(columnNames))

        }

        function loadColumns() {

            const c = localStorage.getItem("scan_columns_v1")

            if (c) columnNames = JSON.parse(c)

        }

        /* count */

        function updateCount() {

            document.getElementById("count").innerText = history.length

        }

        /* 初始化 */

        window.onload = async () => {

            await initDB()

            loadColumns()

            await loadDB()

        }

    </script>

</body>

</html>
