<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>扫描管理器</title>
    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="./assets/exceljs.min.js"></script>
    <script src="./assets/vue.global.js"></script>
    <script src="./assets/Sortable.min.js"></script>
    <script src="./assets/vconsole.min.js"></script>
    <script>new window.VConsole()</script>

    <style>
        .snapshot {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">
    <div id="app">
        <header class="bg-white px-4 py-3 shadow flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600">扫描管理器</h1>
            <div class="flex gap-2">
                <button onclick="toggleTorch()" class="bg-white px-3 py-2 rounded border text-sm">🔦</button>
                <button @click="showColumns=true" class="bg-gray-200 px-3 py-2 rounded text-sm">配置列名</button>
                <button @click="exportXLSX" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">
                    导出（<span id="count">{{data.length}}</span>）
                </button>
            </div>
        </header>

        <section id="scannerSection" class="relative w-full aspect-square border-2 border-white">
            <div id="reader"></div>
            <div id="overlay" class="absolute inset-0 bg-black flex items-center justify-center">
                <button" @click="startScanner"
                    class="w-16 h-16 flex items-center text-white justify-center rounded-full border-2 border-white transition active:scale-95">
                    <svg class="w-8 h-8 ml-1" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    </button>
            </div>
        </section>

        <section id="managerSection" class="flex-1 overflow-y-auto px-4 pb-10">
            <button @click="clearAll" class="bg-white px-3 py-2 rounded border text-sm text-red-500">
                清空
            </button>
            <div id="list" class="space-y-3">
                <div v-for="(item, index) in data" :key="item.id"
                    class="flex items-center bg-white border border-slate-100 p-3 rounded-2xl shadow-sm">
                    <div class="handle p-2 text-slate-300">☰</div>
                    <div class="flex flex-col gap-1 mr-3">
                        <button @click="move(index, -1)"
                            class="text-[10px] text-slate-400 hover:text-blue-500 disabled:invisible"
                            :disabled="index === 0">▲</button>
                        <button @click="move(index, 1)"
                            class="text-[10px] text-slate-400 hover:text-blue-500 disabled:invisible"
                            :disabled="index === data.length - 1">▼</button>
                    </div>
                    <div class="flex-1 font-medium text-slate-700 truncate px-2">{{ item.content }}</div>
                    <img :src="item.snapshot" class="snapshot" @click="showPreview(item.snapshot)">
                    <button @click="remove(index)" class="p-2 text-red-400">✕</button>
                </div>
            </div>
        </section>

        <div v-if="showColumns" @click.self="showColumns=false" class="fixed inset-0 bg-black/40 flex items-end z-50">
            <div class="bg-white w-full rounded-t-3xl p-6 transition-transform shadow-2xl">
                <div class="flex flex-wrap gap-4 mb-6">
                    <div v-for="(val, i) in columnNames" :key="i" class="relative">
                        <input v-model="columnNames[i]"
                            class="w-20 bg-gray-100 rounded px-1 py-1 outline-none focus:bg-blue-100 transition-colors"
                            autofocus>
                        <button @click="columnNames.splice(i, 1)"
                            class="absolute -right-1.5 -bottom-1.5 bg-red-500 text-white w-3.5 h-3.5 rounded-full text-[8px] flex items-center justify-center shadow-sm">✕</button>
                    </div>
                    <button @click="columnNames.push('')"
                        class="w-20 border-2 border-dashed rounded py-1 text-gray-400 text-sm">+</button>
                </div>
                <button @click="showColumns=false"
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">完成</button>
            </div>
        </div>


    </div>



    <div id="preview" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
        <img id="previewImg" class="max-w-full max-h-full">
    </div>

    <script>
        const SCANNER_CONFIG = { fps: 20, qrbox: (w, h) => ({ width: w * .5, height: h * .5 }), aspectRatio: 1 }
        const DB_NAME = "scannerDB"
        const TABLE_NAME = "records"
        const COLUMNS_STORAGE_KEY = "columns"
        const SNAPSHOT_SIZE = 256
        const SCAN_DEBOUNCE = 400
        const SCAN_PAUSED_MS = 300

        let db = null

        // 数据库
        function initDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1)
                req.onupgradeneeded = e => {
                    db = e.target.result
                    db.createObjectStore(TABLE_NAME, { keyPath: "id" })
                }
                req.onsuccess = e => {
                    db = e.target.result
                    res()
                }
            })
        }
        function loadDB() {
            return new Promise(res => {
                const req = db.transaction(TABLE_NAME, "readonly").objectStore(TABLE_NAME).getAll()
                req.onsuccess = () => {
                    res(req.result.sort((a, b) => b.id - a.id))
                }
            })
        }
        function addDBItem(item) {
            db.transaction(TABLE_NAME, "readwrite").objectStore(TABLE_NAME).put(item)
        }
        function removeDBItem(id) {
            db.transaction(TABLE_NAME, "readwrite").objectStore(TABLE_NAME).delete(id)
        }
        function clearDB() {
            db.transaction(TABLE_NAME, "readwrite").objectStore(TABLE_NAME).clear()
        }

        // 扫描相关
        function getCameraTrack() {
            const video = document.querySelector("#reader video")
            if (!video || !video.srcObject) return null
            return video.srcObject.getVideoTracks()[0]
        }
        function captureSnapshot() {
            const video = document.querySelector("#reader video")
            if (!video) return null
            const canvas = document.createElement("canvas")
            canvas.width = SNAPSHOT_SIZE
            canvas.height = SNAPSHOT_SIZE
            const ctx = canvas.getContext("2d")
            const vw = video.videoWidth
            const vh = video.videoHeight
            const s = Math.min(vw, vh)
            const sx = (vw - s) / 2
            const sy = (vh - s) / 2
            ctx.drawImage(video, sx, sy, s, s, 0, 0, SNAPSHOT_SIZE, SNAPSHOT_SIZE)
            return canvas.toDataURL("image/jpeg", 0.9)
        }
        function setupPinchZoom() {
            const track = getCameraTrack()
            if (!track) return
            const capabilities = track.getCapabilities()
            if (!capabilities.zoom) return

            let initDistance = 0
            let currentZoom = capabilities.zoom.min
            let minZoom = capabilities.zoom.min
            let maxZoom = capabilities.zoom.max

            const container = document.getElementById("reader")
            container.addEventListener("touchstart", e => {
                if (e.touches.length === 2) {
                    initDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY)
                }
            }, { passive: false })
            container.addEventListener("touchmove", async e => {
                if (e.touches.length !== 2) return
                e.preventDefault()
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY)
                const delta = (dist - initDistance) / 100
                const nextZoom = Math.max(minZoom, Math.min(currentZoom + delta))
                await track.applyConstraints({ advanced: [{ zoom: nextZoom }] })
                currentZoom = nextZoom
                initDistance = dist
            }, { passive: false })
        }
        async function toggleTorch() {
            const track = getCameraTrack()
            if (!track) return
            const capabilities = track.getCapabilities()
            if (!capabilities.torch) return
            const settings = track.getSettings()
            await track.applyConstraints({ advanced: [{ torch: !settings.torch }] })
        }


        const { createApp, ref, watch, computed, onMounted, nextTick } = Vue
        createApp({
            setup() {
                const data = ref([])
                let dataHash = {}
                const columnNames = ref(["内容"])
                const showColumns = ref(false)
                let scanner = null
                let scanPaused = false
                let lastScan = 0

                async function startScanner() {
                    if (scanner) return
                    document.getElementById("overlay").classList.add("hidden")
                    scanner = new Html5Qrcode("reader")
                    await scanner.start({ facingMode: "environment" }, SCANNER_CONFIG, onScanSuccess).then(setupPinchZoom)
                }
                function onScanSuccess(text) {
                    if (!text) return
                    if (scanPaused) return
                    if (dataHash[text]) return
                    const now = Date.now()
                    if (now - lastScan < SCAN_DEBOUNCE) return
                    lastScan = now
                    scanner.pause(true)
                    scanPaused = true
                    add(text)
                    setTimeout(() => {
                        scanner.resume()
                        scanPaused = false
                    }, SCAN_PAUSED_MS)
                }
                async function stopScanner() {
                    if (!scanner || scanner.getState() == 1) return
                    document.getElementById("overlay").classList.remove("hidden")
                    await scanner.stop()
                    await scanner.clear()
                    scanner = null
                }

                // 增删排
                function add(content) {
                    const snapshot = captureSnapshot()
                    const item = { id: Date.now(), content, snapshot }
                    data.value.unshift(item)
                    dataHash[content] = 1
                    addDBItem(item)
                }
                const remove = (index) => {
                    id = data.value[index].id
                    content = data.value[index].content
                    removeDBItem(id)
                    delete dataHash[content]
                    data.value.splice(index, 1)
                }
                const clearAll = () => {
                    if (!confirm("确定清空记录吗？")) return
                    clearDB()
                    data.value = []
                    dataHash = {}
                }
                const move = (index, step) => {
                    const target = index + step
                    if (target < 0 || target >= data.value.length) return
                    const temp = data.value[index]
                    data.value[index] = data.value[target]
                    data.value[target] = temp
                }
                onMounted(async () => {
                    Sortable.create(document.getElementById("list"), {
                        handle: ".handle",
                        animation: 200,
                        onEnd: (e) => {
                            const temp = [...data.value]
                            const item = temp.splice(e.oldIndex, 1)[0]
                            temp.splice(e.newIndex, 0, item)
                            data.value = []
                            nextTick(() => { data.value = temp })
                        }
                    })

                    await initDB()
                    let res = await loadDB()
                    data.value = res
                    res.forEach(v => dataHash[v.content] = 1)

                    res = localStorage.getItem(COLUMNS_STORAGE_KEY)
                    if (res) columnNames.value = JSON.parse(res)
                })

                function showPreview(src) {
                    const p = document.getElementById("preview")
                    document.getElementById("previewImg").src = src
                    p.classList.remove("hidden")
                    p.onclick = () => p.classList.add("hidden")
                }

                watch(columnNames, (newVal) => {
                    localStorage.setItem(COLUMNS_STORAGE_KEY, JSON.stringify(newVal))
                }, { deep: true })

                async function exportXLSX() {
                    if (!data.value.length) return alert("无数据")
                    const workbook = new ExcelJS.Workbook();
                    const worksheet = workbook.addWorksheet("扫描记录")

                    const headers = ["序号", ...columnNames.value]
                    worksheet.columns = headers.map(h => ({ header: h, key: h, width: 15 }));
                    worksheet.getRow(1).font = { bold: true }

                    const colCount = columnNames.value.length
                    let rowIndex = 1
                    for (let i = 0; i < data.value.length; i += colCount) {
                        const rowChunk = data.value.slice(i, i + colCount)
                        worksheet.addRow([rowIndex++, ...rowChunk.map(i => i.content)])
                    }

                    worksheet.columns.forEach((column, colIndex) => {
                        const isFirstColumn = (colIndex === 0)
                        let maxColumnLength = 0
                        column.eachCell({ includeEmpty: true }, (cell) => {
                            if (isFirstColumn) cell.alignment = { vertical: "middle", horizontal: "center" }
                            else cell.alignment = { vertical: "middle", horizontal: "left" }
                            const cellValue = cell.value ? cell.value.toString() : ""
                            const currentLength = cellValue.split("").reduce((acc, char) => acc + (char.charCodeAt(0) > 255 ? 2 : 1), 0)
                            if (currentLength > maxColumnLength) maxColumnLength = currentLength
                        })
                        column.width = maxColumnLength < 10 ? 10 : maxColumnLength + 2
                    })

                    const buf = await workbook.xlsx.writeBuffer()
                    const blob = new Blob([buf])
                    const a = document.createElement("a")
                    a.href = URL.createObjectURL(blob)
                    a.download = `扫描记录_${Date.now()}.xlsx`
                    a.click()
                }

                return { data, startScanner, stopScanner, move, remove, clearAll, showPreview, showColumns, columnNames, exportXLSX }
            }
        }).mount("#app")


    </script>
</body>

</html>
