<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>条形码扫描器</title>

    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new window.VConsole();
    </script>
    <style>
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
            touch-action: none;
        }

        #reader__dashboard_section_csr button,
        #reader__dashboard_section_swaplink,
        #reader img {
            display: none !important;
        }

        .item-transition {
            transition: all .3s ease;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes flash {
            0% {
                background-color: rgba(59, 130, 246, .5)
            }

            100% {
                background-color: transparent
            }
        }

        .flash-effect {
            animation: flash .4s ease-out;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans antialiased text-slate-900">

    <header class="bg-white px-4 py-3 shadow-md z-30 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-blue-600 tracking-tight">SCANNER <span
                    class="text-slate-400 font-light">PRO</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Management System</p>
        </div>

        <button onclick="exportToCSV()"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-200 active:scale-95 transition">
            导出 CSV (<span id="countText">0</span>)
        </button>
    </header>

    <section class="p-4 flex-shrink-0">

        <div class="relative">

            <div id="reader"></div>

            <div id="zoomVisual"
                class="absolute top-4 right-4 bg-black/60 text-white text-[10px] px-2 py-1 rounded hidden">
                Zoom: <span id="zoomVal">1.0</span>x
            </div>

            <div id="startOverlay"
                class="absolute inset-0 bg-slate-900/90 rounded-[20px] flex flex-col items-center justify-center text-white z-20">

                <button onclick="initScanner()" class="bg-blue-500 p-4 rounded-full shadow-2xl animate-bounce">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />

                    </svg>

                </button>

                <p class="mt-4 font-bold text-sm">点击开启摄像头</p>

            </div>

        </div>

        <div class="flex gap-2 mt-3">

            <button onclick="toggleTorch()"
                class="flex-1 bg-white py-2 rounded-xl border border-slate-200 text-sm font-bold text-slate-600 active:bg-slate-50">
                🔦 补光灯
            </button>

            <button onclick="clearAll()"
                class="flex-1 bg-white py-2 rounded-xl border border-slate-200 text-sm font-bold text-red-500 active:bg-red-50">
                🗑️ 清空全部
            </button>

        </div>

    </section>

    <main class="flex-1 overflow-y-auto px-4 pb-10 no-scrollbar">

        <div class="flex justify-between items-center mb-3 px-1">

            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">扫描管理列表</h2>

        </div>

        <div id="manageList" class="space-y-3">

            <div id="emptyTip"
                class="text-center py-10 bg-white/50 rounded-2xl border-2 border-dashed border-slate-200 text-slate-400 text-sm">
                当前暂无记录
            </div>

        </div>

    </main>

    <audio id="beepAudio" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <script>

        let html5QrCode = null
        let scanHistory = []
        let isTorchOn = false
        let currentZoom = 1
        let initialPinchDist = 0

        function getCameraTrack() {

            const video = document.querySelector("#reader video")

            if (!video || !video.srcObject) return null

            return video.srcObject.getVideoTracks()[0]

        }

        async function initScanner() {

            document.getElementById('startOverlay').style.display = 'none'

            html5QrCode = new Html5Qrcode("reader")

            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: (w, h) => ({ width: w * .8, height: h * .4 }) },
                (text) => onScanSuccess(text)
            )

            setupZoomGestures()

        }

        function onScanSuccess(decodedText) {

            if (scanHistory.some(i => i.code === decodedText)) return

            scanHistory.unshift({
                id: Date.now(),
                code: decodedText,
                time: new Date().toLocaleTimeString()
            })

            feedbackEffect()

            renderList()

        }

        function setupZoomGestures() {

            const container = document.getElementById('reader')

            container.addEventListener('touchstart', e => {

                if (e.touches.length === 2) {

                    initialPinchDist = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY)

                }

            }, { passive: false })

            container.addEventListener('touchmove', async e => {

                if (e.touches.length !== 2) return

                e.preventDefault()

                const track = getCameraTrack()

                if (!track) return

                const cap = track.getCapabilities()

                if (!cap.zoom) return

                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY)

                const delta = (dist - initialPinchDist) / 200

                let next = currentZoom + delta

                next = Math.max(cap.zoom.min, Math.min(cap.zoom.max, next))

                await track.applyConstraints({ advanced: [{ zoom: next }] })

                currentZoom = next
                initialPinchDist = dist

                const zoomUI = document.getElementById('zoomVisual')

                zoomUI.classList.remove('hidden')

                document.getElementById('zoomVal').innerText = currentZoom.toFixed(1)

            }, { passive: false })

        }

        async function toggleTorch() {

            const track = getCameraTrack()

            if (!track) return alert("摄像头未启动")

            const cap = track.getCapabilities()

            if (!cap.torch) return alert("设备不支持补光灯")

            isTorchOn = !isTorchOn

            await track.applyConstraints({
                advanced: [{ torch: isTorchOn }]
            })

        }

        function renderList() {

            const list = document.getElementById('manageList')

            document.getElementById('countText').innerText = scanHistory.length

            if (!scanHistory.length) {

                list.innerHTML = `<div id="emptyTip" class="text-center py-10 bg-white/50 rounded-2xl border-2 border-dashed border-slate-200 text-slate-400 text-sm">当前暂无记录</div>`

                return

            }

            list.innerHTML = scanHistory.map((item, i) => `

<div class="bg-white p-4 rounded-2xl shadow-sm border flex items-center justify-between">

<div class="flex-1 min-w-0">

<p class="font-mono font-black truncate">${item.code}</p>

<p class="text-[10px] text-slate-400">${item.time}</p>

</div>

<button onclick="removeItem(${i})" class="text-red-400">删除</button>

</div>

`).join('')

            saveToLocal()

        }

        function removeItem(i) {

            scanHistory.splice(i, 1)

            renderList()

        }

        function exportToCSV() {

            if (!scanHistory.length) return alert("无数据")

            let csv = "\uFEFF序号,条码,时间\n"

            scanHistory.forEach((v, i) => {
                csv += `${i + 1},"${v.code}","${v.time}"\n`
            })

            const blob = new Blob([csv])

            const a = document.createElement("a")

            a.href = URL.createObjectURL(blob)

            a.download = "scan_export.csv"

            a.click()

        }

        function feedbackEffect() {

            document.getElementById('beepAudio').play().catch(() => { })

            if (navigator.vibrate) navigator.vibrate(50)

            const reader = document.getElementById('reader')

            reader.classList.add('flash-effect')

            setTimeout(() => reader.classList.remove('flash-effect'), 400)

        }

        function clearAll() {

            scanHistory = []

            renderList()

        }

        function saveToLocal() {

            localStorage.setItem('managed_scan_v1', JSON.stringify(scanHistory))

        }

        function loadFromLocal() {

            const saved = localStorage.getItem('managed_scan_v1')

            if (saved) {

                scanHistory = JSON.parse(saved)

                renderList()

            }

        }

        window.addEventListener('load', loadFromLocal)

    </script>

</body>

</html>
