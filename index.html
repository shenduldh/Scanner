<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

    <title>Scanner Pro Industrial</title>

    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="./assets/vconsole.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script>new window.VConsole()</script>

    <style>
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
            touch-action: none
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none
        }

        .flash {
            animation: flash .35s
        }

        @keyframes flash {
            0% {
                background: rgba(59, 130, 246, .6)
            }

            100% {
                background: transparent
            }
        }

        .snapshot {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd
        }
    </style>

</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-white px-4 py-3 shadow flex justify-between items-center">

        <div>
            <h1 class="text-xl font-black text-blue-600">SCANNER PRO</h1>
            <p class="text-xs text-gray-400">Industrial Edition</p>
        </div>

        <button onclick="exportXLSX()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold">
            导出 (<span id="count">0</span>)
        </button>

    </header>

    <section id="scannerSection" class="p-4 flex-shrink-0">

        <div class="relative">

            <div id="reader"></div>

            <div id="zoomUI" class="absolute top-3 right-3 bg-black/70 text-white text-xs px-2 py-1 rounded hidden">
                Zoom <span id="zoomVal">1</span>x
            </div>

            <div id="overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center text-white">
                <button onclick="startScanner()"
                    class="bg-blue-500 p-5 rounded-full shadow-xl animate-bounce">▶</button>
            </div>

        </div>

        <div class="flex gap-2 mt-3">

            <button onclick="toggleTorch()" class="flex-1 bg-white py-2 rounded border text-sm">
                🔦 补光灯
            </button>

            <button onclick="clearAll()" class="flex-1 bg-white py-2 rounded border text-sm text-red-500">
                清空
            </button>

        </div>

    </section>

    <div id="manageBar" class="hidden bg-white p-2 shadow text-center">
        <button onclick="showScanner()" class="text-blue-600 font-bold">返回扫描</button>
    </div>

    <main id="listArea" class="flex-1 overflow-y-auto px-4 pb-10 no-scrollbar">

        <div id="list" class="space-y-2"></div>

    </main>

    <!-- 放大图片 -->

    <div id="preview" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">

        <img id="previewImg" class="max-w-full max-h-full">

    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>

        let scanner = null
        let scannerPaused = false

        let history = []
        let historyHash = {}

        const COLUMN_NAMES = []

        const MAX_HISTORY = 1000
        const SCAN_DEBOUNCE = 300
        const PAUSE_TIME = 200

        let lastScan = 0

        let currentZoom = 1
        let pinchStart = 0

        let torch = false

        /* ---------- 本地存储 ---------- */

        function saveLocal() {
            localStorage.setItem("scan_history_v3", JSON.stringify(history))
        }

        function loadLocal() {

            try {

                const d = localStorage.getItem("scan_history_v3")
                if (!d) return

                history = JSON.parse(d)

                history.forEach(v => historyHash[v.code] = 1)

                renderAll()

            } catch (e) {

                history = []
                historyHash = {}

            }

        }

        /* ---------- track ---------- */

        function getTrack() {

            const v = document.querySelector("#reader video")

            if (!v || !v.srcObject) return null

            return v.srcObject.getVideoTracks()[0]

        }

        /* ---------- 启动 ---------- */

        async function startScanner() {

            document.getElementById("overlay").style.display = "none"

            scanner = new Html5Qrcode("reader")

            await scanner.start(
                { facingMode: "environment" },
                {
                    fps: 30,
                    qrbox: (w, h) => ({ width: w * .7, height: h * .35 })
                },
                onScan
            )

            enableZoom()

        }

        /* ---------- 快照 ---------- */

        function captureSnapshot() {

            const video = document.querySelector("#reader video")

            if (!video) return null

            const canvas = document.createElement("canvas")

            const size = 160

            canvas.width = size
            canvas.height = size

            const ctx = canvas.getContext("2d")

            ctx.drawImage(video, 0, 0, size, size)

            return canvas.toDataURL("image/jpeg", 0.6)

        }

        /* ---------- 扫码 ---------- */

        async function onScan(text) {

            const now = Date.now()

            if (now - lastScan < SCAN_DEBOUNCE) return

            lastScan = now

            if (historyHash[text]) return

            historyHash[text] = 1

            if (scanner && !scannerPaused) {

                scanner.pause(true)
                scannerPaused = true

            }

            addRecord(text)

            feedback()

            setTimeout(() => {

                if (scanner && scannerPaused) {

                    scanner.resume()
                    scannerPaused = false

                }

            }, PAUSE_TIME)

        }

        /* ---------- 新记录 ---------- */

        function addRecord(code) {

            const snapshot = captureSnapshot()

            const item = {
                id: Date.now(),
                code,
                snapshot
            }

            history.unshift(item)

            if (history.length > MAX_HISTORY) {

                const r = history.pop()

                delete historyHash[r.code]

            }

            prependDOM(item)

            updateCount()

            saveLocal()

        }

        /* ---------- DOM ---------- */

        function prependDOM(item) {

            const list = document.getElementById("list")

            const el = document.createElement("div")

            el.className = "bg-white p-3 rounded shadow flex items-center gap-2"

            el.innerHTML = `

<div class="flex flex-col">
<button onclick="moveItem('${item.id}',-1)">⬆</button>
<button onclick="moveItem('${item.id}',1)">⬇</button>
</div>

<img src="${item.snapshot}" class="snapshot" onclick="showPreview('${item.snapshot}')">

<div class="flex-1 font-mono truncate">${item.code}</div>

<button onclick="removeItem('${item.id}')" class="text-red-500">删</button>

`

            list.prepend(el)

        }

        /* ---------- 渲染 ---------- */

        function renderAll() {

            const list = document.getElementById("list")

            list.innerHTML = ""

            history.forEach(prependDOM)

            updateCount()

        }

        /* ---------- 删除 ---------- */

        function removeItem(id) {

            const item = history.find(v => v.id == id)

            history = history.filter(v => v.id != id)

            delete historyHash[item.code]

            saveLocal()

            renderAll()

        }

        /* ---------- 排序 ---------- */

        function moveItem(id, dir) {

            const i = history.findIndex(v => v.id == id)

            const ni = i + dir

            if (ni < 0 || ni >= history.length) return

            const t = history[i]

            history[i] = history[ni]
            history[ni] = t

            saveLocal()

            renderAll()

        }

        /* ---------- 隐藏扫描 ---------- */

        document.getElementById("listArea").addEventListener("click", () => {

            document.getElementById("scannerSection").classList.add("hidden")
            document.getElementById("manageBar").classList.remove("hidden")

        })

        function showScanner() {

            document.getElementById("scannerSection").classList.remove("hidden")
            document.getElementById("manageBar").classList.add("hidden")

        }

        /* ---------- 快照预览 ---------- */

        function showPreview(src) {

            const p = document.getElementById("preview")

            document.getElementById("previewImg").src = src

            p.classList.remove("hidden")

            p.onclick = () => p.classList.add("hidden")

        }

        /* ---------- Torch ---------- */

        async function toggleTorch() {

            const track = getTrack()
            if (!track) return

            const cap = track.getCapabilities()

            if (!cap.torch) {

                alert("设备不支持")
                return

            }

            torch = !torch

            await track.applyConstraints({
                advanced: [{ torch }]
            })

        }

        /* ---------- Zoom ---------- */

        function enableZoom() {

            const container = document.getElementById("reader")

            container.addEventListener("touchstart", e => {

                if (e.touches.length == 2) {

                    pinchStart = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY)

                }

            })

            container.addEventListener("touchmove", async e => {

                if (e.touches.length != 2) return

                const track = getTrack()
                if (!track) return

                const cap = track.getCapabilities()

                if (!cap.zoom) return

                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY)

                let delta = (dist - pinchStart) / 200

                let next = currentZoom + delta

                next = Math.max(cap.zoom.min, Math.min(cap.zoom.max, next))

                await track.applyConstraints({
                    advanced: [{ zoom: next }]
                })

                currentZoom = next
                pinchStart = dist

                document.getElementById("zoomUI").classList.remove("hidden")
                document.getElementById("zoomVal").innerText = currentZoom.toFixed(1)

            })

        }

        /* ---------- 反馈 ---------- */

        function feedback() {

            document.getElementById("beep").play().catch(() => { })

            if (navigator.vibrate) navigator.vibrate(30)

            const r = document.getElementById("reader")

            r.classList.add("flash")

            setTimeout(() => r.classList.remove("flash"), 300)

        }

        /* ---------- XLSX 导出 ---------- */

        function exportXLSX() {

            if (!history.length) return alert("无数据")

            let columns = COLUMN_NAMES.length ? COLUMN_NAMES : ["内容"]

            columns = [...columns, "快照"]

            let data = []

            let row = []

            history.forEach((item, i) => {

                row.push(item.code)

                if (row.length === columns.length - 1) {

                    row.push(item.snapshot)

                    data.push(row)

                    row = []

                }

            })

            if (row.length) {

                while (row.length < columns.length - 1) row.push("")
                row.push("")
                data.push(row)

            }

            const ws = XLSX.utils.aoa_to_sheet([columns, ...data])

            const wb = XLSX.utils.book_new()

            XLSX.utils.book_append_sheet(wb, ws, "scan")

            XLSX.writeFile(wb, "scan_export.xlsx")

        }

        /* ---------- 清空 ---------- */

        function clearAll() {

            if (!confirm("确定清空?")) return

            history = []
            historyHash = {}

            localStorage.removeItem("scan_history_v3")

            renderAll()

        }

        /* ---------- count ---------- */

        function updateCount() {

            document.getElementById("count").innerText = history.length

        }

        /* ---------- init ---------- */

        window.onload = loadLocal

    </script>

</body>

</html>
