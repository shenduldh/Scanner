<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Scanner Pro Industrial</title>

    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="./assets/xlsx.full.min.js"></script>

    <!-- <script src="./assets/vconsole.min.js"></script> -->
    <!-- <script>new window.VConsole()</script> -->

    <style>
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
            touch-action: none
        }

        .snapshot {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd
        }

        .flash {
            animation: flash .35s
        }

        @keyframes flash {
            0% {
                background: rgba(59, 130, 246, .6)
            }

            100% {
                background: transparent
            }
        }
    </style>

</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-white px-4 py-3 shadow flex justify-between items-center">

        <div>
            <h1 class="text-xl font-black text-blue-600">SCANNER PRO</h1>
        </div>

        <div class="flex gap-2">

            <button onclick="configColumns()" class="bg-gray-200 px-3 py-2 rounded text-sm">
                列名
            </button>

            <button onclick="exportXLSX()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">
                导出 (<span id="count">0</span>)
            </button>

        </div>

    </header>

    <section id="scannerSection" class="p-4">

        <div class="relative">

            <div id="reader"></div>

            <div id="overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center text-white">
                <button onclick="startScanner()" class="bg-blue-500 p-5 rounded-full shadow-xl">▶</button>
            </div>

        </div>

        <div class="flex gap-2 mt-3">

            <button onclick="toggleTorch()" class="flex-1 bg-white py-2 rounded border text-sm">
                🔦 补光灯
            </button>

            <button onclick="clearAll()" class="flex-1 bg-white py-2 rounded border text-sm text-red-500">
                清空
            </button>

        </div>

    </section>

    <main class="flex-1 overflow-y-auto px-4 pb-10">

        <div id="list" class="space-y-2"></div>

    </main>

    <div id="preview" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
        <img id="previewImg" class="max-w-full max-h-full">
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>

        let scanner = null
        let scannerPaused = false

        let history = []
        let historyHash = {}

        let columnNames = []

        const MAX_HISTORY = 1000
        const SCAN_DEBOUNCE = 300
        const PAUSE_TIME = 200

        let lastScan = 0
        let torch = false

        /* ---------- 本地存储 ---------- */

        function saveLocal() {

            localStorage.setItem("scan_history_v4", JSON.stringify(history))

        }

        function loadLocal() {

            try {

                const d = localStorage.getItem("scan_history_v4")
                if (d) history = JSON.parse(d)

                history.forEach(v => historyHash[v.code] = 1)

                const c = localStorage.getItem("scan_columns_v1")
                if (c) columnNames = JSON.parse(c)

                renderAll()

            } catch (e) {

                history = []
                historyHash = {}

            }

        }

        /* ---------- 列名配置 ---------- */

        function configColumns() {

            const v = prompt("输入列名，用逗号分隔\n例：箱号,SKU,数量", columnNames.join(","))

            if (v === null) return

            columnNames = v.split(",").map(s => s.trim()).filter(Boolean)

            localStorage.setItem("scan_columns_v1", JSON.stringify(columnNames))

        }

        /* ---------- 摄像头 ---------- */

        function getTrack() {

            const v = document.querySelector("#reader video")

            if (!v || !v.srcObject) return null

            return v.srcObject.getVideoTracks()[0]

        }

        /* ---------- 启动 ---------- */

        async function startScanner() {

            document.getElementById("overlay").style.display = "none"

            scanner = new Html5Qrcode("reader")

            await scanner.start(
                { facingMode: "environment" },
                { fps: 30 },
                onScan
            )

        }

        /* ---------- 快照 ---------- */

        function captureSnapshot() {

            const video = document.querySelector("#reader video")

            if (!video) return null

            const canvas = document.createElement("canvas")

            const size = 128

            canvas.width = size
            canvas.height = size

            const ctx = canvas.getContext("2d")

            ctx.drawImage(video, 0, 0, size, size)

            return canvas.toDataURL("image/jpeg", 0.6)

        }

        /* ---------- 扫码 ---------- */

        async function onScan(text) {

            const now = Date.now()

            if (now - lastScan < SCAN_DEBOUNCE) return

            lastScan = now

            if (historyHash[text]) return

            historyHash[text] = 1

            scanner.pause(true)
            scannerPaused = true

            addRecord(text)

            feedback()

            setTimeout(() => {
                scanner.resume()
                scannerPaused = false
            }, PAUSE_TIME)

        }

        /* ---------- 新记录 ---------- */

        function addRecord(code) {

            const snapshot = captureSnapshot()

            const item = {
                id: Date.now(),
                code,
                snapshot
            }

            history.unshift(item)

            if (history.length > MAX_HISTORY) {

                const r = history.pop()
                delete historyHash[r.code]

            }

            prependDOM(item)

            updateCount()

            saveLocal()

        }

        /* ---------- DOM ---------- */

        function prependDOM(item) {

            const list = document.getElementById("list")

            const el = document.createElement("div")

            el.className = "bg-white p-3 rounded shadow flex items-center gap-2"

            el.innerHTML = `

<div class="flex flex-col">
<button onclick="moveItem('${item.id}',-1)">⬆</button>
<button onclick="moveItem('${item.id}',1)">⬇</button>
</div>

<img src="${item.snapshot}" class="snapshot" onclick="showPreview('${item.snapshot}')">

<div class="flex-1 font-mono truncate">${item.code}</div>

<button onclick="removeItem('${item.id}')" class="text-red-500">删</button>

`

            list.prepend(el)

        }

        /* ---------- 渲染 ---------- */

        function renderAll() {

            const list = document.getElementById("list")

            list.innerHTML = ""

            history.forEach(prependDOM)

            updateCount()

        }

        /* ---------- 删除 ---------- */

        function removeItem(id) {

            const item = history.find(v => v.id == id)

            history = history.filter(v => v.id != id)

            delete historyHash[item.code]

            saveLocal()

            renderAll()

        }

        /* ---------- 排序 ---------- */

        function moveItem(id, dir) {

            const i = history.findIndex(v => v.id == id)

            const ni = i - dir

            if (ni < 0 || ni >= history.length) return

            const t = history[i]

            history[i] = history[ni]
            history[ni] = t

            saveLocal()

            renderAll()

        }

        /* ---------- 快照预览 ---------- */

        function showPreview(src) {

            const p = document.getElementById("preview")

            document.getElementById("previewImg").src = src

            p.classList.remove("hidden")

            p.onclick = () => p.classList.add("hidden")

        }

        /* ---------- Torch ---------- */

        async function toggleTorch() {

            const track = getTrack()
            if (!track) return

            const cap = track.getCapabilities()

            if (!cap.torch) {

                alert("设备不支持")
                return

            }

            torch = !torch

            await track.applyConstraints({
                advanced: [{ torch }]
            })

        }

        /* ---------- 导出 XLSX ---------- */

        function exportXLSX() {

            if (!history.length) return alert("无数据")

            let cols = columnNames.length ? columnNames : ["内容"]

            cols = [...cols, "快照"]

            let rows = []
            let row = []

            history.forEach(item => {

                row.push(item.code)

                if (row.length === cols.length - 1) {

                    rows.push([...row, item.snapshot])

                    row = []

                }

            })

            if (row.length) {

                while (row.length < cols.length - 1) row.push("")
                rows.push([...row, ""])

            }

            const ws = XLSX.utils.aoa_to_sheet([cols, ...rows])

            const wb = XLSX.utils.book_new()

            XLSX.utils.book_append_sheet(wb, ws, "scan")

            XLSX.writeFile(wb, "scan_export.xlsx")

        }

        /* ---------- 反馈 ---------- */

        function feedback() {

            document.getElementById("beep").play().catch(() => { })

            if (navigator.vibrate) navigator.vibrate(30)

        }

        /* ---------- 清空 ---------- */

        function clearAll() {

            if (!confirm("确定清空?")) return

            history = []
            historyHash = {}

            localStorage.removeItem("scan_history_v4")

            renderAll()

        }

        /* ---------- count ---------- */

        function updateCount() {

            document.getElementById("count").innerText = history.length

        }

        window.onload = loadLocal

    </script>

</body>

</html>
