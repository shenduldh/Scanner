<body class="bg-gray-100 h-screen font-sans">
    <div id="app">
        <!-- 顶栏 -->
        <header
            class="sticky top-0 z-20 bg-white/10 backdrop-blur shadow rounded px-4 py-3 flex justify-between items-center">
            <h1 onclick="vConsole.show()" class="text-2xl font-black text-indigo-600 font-bold cursor-pointer">扫描喵🐱
            </h1>
            <div class="flex gap-2 ">
                <button @click="toggleTorch" class="bg-gray-200/70 px-3 py-2 rounded text-sm">🔦</button>
                <button @click="showColumns=true" class="bg-gray-200/70 px-3 py-2 rounded text-sm">配置列名</button>
                <button @click="exportXLSX" class="bg-blue-800/70 text-white px-4 py-2 rounded text-sm">
                    导出（<span id="count">{{data.length}}</span>）
                </button>
            </div>
        </header>

        <!-- 扫描界面 -->
        <section v-if="!fullscreen" class="relative mx-1 my-2 rounded border-2 border-slate-300 aspect-square ">
            <div id="reader"></div>
            <div id="overlay" class="absolute inset-0 bg-black flex items-center justify-center">
                <button @click="startScanner"
                    class="w-16 h-16 flex items-center text-white justify-center rounded-full border-2 border-white transition active:scale-95">
                    <svg class="w-8 h-8 ml-1" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                </button>
            </div>
            <div id="flash" class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-lime-400/60
            transition-opacity duration-300 ease-out opacity-0
            [mask-image:radial-gradient(ellipse_at_bottom,white,transparent_70%)]">
            </div>
        </section>

        <!-- 管理扫描记录 -->
        <section class="flex flex-col overflow-hidden">
            <div class="text-base text-red-500 p-4 border bg-white rounded flex items-center gap-x-2 mb-2">
                <button @click="clearAll" class="border border-red-200 px-2 py-1 rounded">清空</button>
                <button @click="fullscreen=!fullscreen" class="border border-red-200 px-2 py-1 rounded">
                    {{fullscreen ? "恢复" : "全屏"}}
                </button>
            </div>
            <div id="dataList" class="flex-1 overflow-y-auto p-2 space-y-4">
                <div v-for="(item, index) in data" :key="item.id" class="flex items-center bg-white rounded shadow-sm">
                    <div class="handle cursor-move py-4 mr-2 flex items-center">
                        <span class="text-orange-200 text-sm px-2">{{index+1}}</span>
                        <span class="text-slate-300 text-base">☰</span>
                    </div>
                    <div class="flex flex-col text-[10px] text-slate-400 mr-1">
                        <button @click="move(index, -1)" :disabled="index === 0"
                            class="disabled:invisible mb-1 pr-1">▲</button>
                        <button @click="move(index, 1)" :disabled="index === data.length - 1"
                            class="disabled:invisible mt-1 pr-1">▼</button>
                    </div>
                    <div class="flex-1 truncate font-medium text-slate-700 text-[17px]">{{item.content}}</div>
                    <a :href="item.snapshot" data-pswp-width="2000" data-pswp-height="2000" target="_blank">
                        <img :src="item.snapshot" class="w-10 h-10 object-cover rounded mr-1 cursor-pointer">
                    </a>
                    <button @click="remove(index)" class="text-red-400 ml-2 mr-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- 管理列名 -->
        <div v-if="showColumns" @click.self="showColumns=false" class="fixed inset-0 bg-black/40 flex items-end z-50">
            <div class="bg-white w-full rounded-t-xl p-4 transition-transform max-h-[70vh] flex flex-col">
                <div class="mb-4 text-gray-400 text-[18px] font-bold">配置列名</div>
                <div id="columnsList"
                    class="ml-2 flex flex-wrap gap-y-4 gap-x-6 mb-6 items-center overflow-y-auto overscroll-behavior-contain">
                    <div v-for="(val, i) in columns" :key="i" class="draggable rounded bg-gray-100 flex items-center">
                        <div class="handle cursor-move text-gray-300 text-xl px-4 py-2">⠿</div>
                        <input v-model="columns[i]"
                            class="w-20 p-1 bg-transparent outline-none text-sm focus:bg-blue-100 transition-colors"
                            autofocus="">
                        <button @click="columns.splice(i, 1)" class="ml-1 mr-2 text-red-400 disabled:invisible"
                            :disabled="columns.length === 1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                </path>
                            </svg>
                        </button>
                    </div>
                    <button @click="columns.push('')"
                        class="w-10 border-2 border-dashed rounded text-gray-400 text-xl">+</button>
                </div>
                <button @click="showColumns=false"
                    class="ml-auto block w-32 bg-blue-600 text-white py-2.5 rounded-xl font-bold">完成</button>
            </div>
        </div>

    </div>

    <script type="module">
        import PhotoSwipeLightbox from "./assets/photoswipe-lightbox.esm.js"
        import PhotoSwipe from "./assets/photoswipe.esm.js"

        const SCANNER_CONFIG = {
            fps: 12,
            qrbox: (w, h) => ({
                width: w * .75,
                height: h * .65
            }),
            aspectRatio: 1
        }
        const DB_NAME = "scannerDB"
        const TABLE_NAME = "records"
        const COLUMNS_STORAGE_KEY = "columns"
        const SNAPSHOT_SIZE = 2000
        const SCAN_DEBOUNCE = 400
        const SCAN_PAUSED_MS = 300
        const REQUIRED_CONFIRMATIONS = 3 // 要求连续扫描到多次相同内容才算识别成功
        let db = null

        // 数据库
        function initDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1)
                req.onupgradeneeded = e => {
                    db = e.target.result
                    db.createObjectStore(TABLE_NAME, {
                        keyPath: "id"
                    })
                }
                req.onsuccess = e => {
                    db = e.target.result
                    res()
                }
            })
        }
        function loadDB() {
            return new Promise(res => {
                const req = db.transaction(TABLE_NAME, "readonly").objectStore(TABLE_NAME).getAll()
                req.onsuccess = () => {
                    res(req.result.sort((a, b) => b.id - a.id))
                }
            })
        }
        function addDBItem(item) {
            db.transaction(TABLE_NAME, "readwrite").objectStore(TABLE_NAME).put(item)
        }
        function removeDBItem(id) {
            db.transaction(TABLE_NAME, "readwrite").objectStore(TABLE_NAME).delete(id)
        }
        function clearDB() {
            db.transaction(TABLE_NAME, "readwrite").objectStore(TABLE_NAME).clear()
        }

        const {
            createApp,
            ref,
            watch,
            computed,
            onMounted,
            nextTick
        } = window.Vue

        createApp({
            setup() {
                const data = ref([])
                let dataHash = {}
                const fullscreen = ref(false)
                const columns = ref(["内容"])
                const showColumns = ref(false)
                let scanner = null
                let scanPaused = false
                let lastScanTime = 0
                let lastDecodedText = null
                let continualScanCount = 0

                // 获取当前扫描的视频
                function getCameraTrack() {
                    const video = document.querySelector("#reader video")
                    if (!video || !video.srcObject) return null
                    return video.srcObject.getVideoTracks()[0]
                }
                // 快照
                function captureSnapshot() {
                    const video = document.querySelector("#reader video")
                    if (!video) return null
                    const canvas = document.createElement("canvas")
                    canvas.width = SNAPSHOT_SIZE
                    canvas.height = SNAPSHOT_SIZE
                    const ctx = canvas.getContext("2d")
                    const vw = video.videoWidth
                    const vh = video.videoHeight
                    const s = Math.min(vw, vh)
                    const sx = (vw - s) / 2
                    const sy = (vh - s) / 2
                    ctx.drawImage(video, sx, sy, s, s, 0, 0, SNAPSHOT_SIZE, SNAPSHOT_SIZE)
                    return canvas.toDataURL("image/jpeg", 1.0)
                }
                // 设置缩放
                function setupPinchZoom() {
                    const track = getCameraTrack()
                    if (!track) return
                    const capabilities = track.getCapabilities()
                    if (!capabilities.zoom) return
                    let initDistance = 0
                    let currentZoom = capabilities.zoom.min
                    let minZoom = capabilities.zoom.min
                    let maxZoom = capabilities.zoom.max
                    const container = document.getElementById("reader")
                    container.addEventListener("touchstart", e => {
                        if (e.touches.length === 2) {
                            initDistance = Math.hypot(
                                e.touches[0].pageX - e.touches[1].pageX,
                                e.touches[0].pageY - e.touches[1].pageY)
                        }
                    }, {
                        passive: false
                    })
                    container.addEventListener("touchmove", async e => {
                        if (e.touches.length !== 2) return
                        e.preventDefault()
                        const dist = Math.hypot(
                            e.touches[0].pageX - e.touches[1].pageX,
                            e.touches[0].pageY - e.touches[1].pageY)
                        const delta = (dist - initDistance) / 100
                        const nextZoom = Math.max(minZoom, Math.min(currentZoom + delta))
                        await track.applyConstraints({
                            advanced: [{
                                zoom: nextZoom
                            }]
                        })
                        currentZoom = nextZoom
                        initDistance = dist
                    }, {
                        passive: false
                    })
                }
                // 闪光灯
                async function toggleTorch() {
                    const track = getCameraTrack()
                    if (!track) return
                    const capabilities = track.getCapabilities()
                    if (!capabilities.torch) return
                    const settings = track.getSettings()
                    await track.applyConstraints({
                        advanced: [{
                            torch: !settings.torch
                        }]
                    })
                }
                // 启动扫描函数
                async function startScanner() {
                    if (scanner) return
                    document.getElementById("overlay").classList.add("hidden")
                    scanner = new Html5Qrcode("reader")
                    await scanner.start({
                        facingMode: "environment"
                    }, SCANNER_CONFIG, onScanSuccess, onScanFailure).then(setupPinchZoom)
                }
                // 扫描成功回调函数
                function onScanSuccess(text) {
                    if (!text) return
                    if (scanPaused) return
                    if (lastDecodedText === text) continualScanCount++
                    else { lastDecodedText = text; continualScanCount = 1 }
                    if (continualScanCount < REQUIRED_CONFIRMATIONS) return
                    if (dataHash[text]) return
                    const now = Date.now()
                    if (now - lastScanTime < SCAN_DEBOUNCE) return
                    lastScanTime = now
                    // 识别成功动画
                    const flash = document.getElementById("flash")
                    flash.classList.replace("opacity-0", "opacity-100")
                    // 暂停识别
                    scanner.pause(true)
                    scanPaused = true
                    // 处理识别结果
                    add(text)
                    // 恢复识别
                    setTimeout(() => {
                        flash.classList.replace("opacity-100", "opacity-0")
                        scanner.resume()
                        scanPaused = false
                    }, SCAN_PAUSED_MS)
                }
                function onScanFailure(error) {
                    console.warn(`Scan error: ${error}`)
                }
                // 停止扫描函数
                async function stopScanner() {
                    if (!scanner || scanner.getState() == 1) return
                    document.getElementById("overlay").classList.remove("hidden")
                    await scanner.stop()
                    scanner = null
                }
                // 增加记录
                function add(content) {
                    const snapshot = captureSnapshot()
                    const item = {
                        id: Date.now(),
                        content,
                        snapshot
                    }
                    data.value.unshift(item)
                    dataHash[content] = 1
                    addDBItem(item)
                }
                // 删除记录
                const remove = (index) => {
                    id = data.value[index].id
                    content = data.value[index].content
                    removeDBItem(id)
                    delete dataHash[content]
                    data.value.splice(index, 1)
                }
                // 清空记录
                const clearAll = () => {
                    if (!confirm("确定清空记录吗？")) return
                    clearDB()
                    data.value = []
                    dataHash = {}
                }
                // 记录按钮排序
                const move = (index, step) => {
                    const target = index + step
                    if (target < 0 || target >= data.value.length) return
                    const temp = data.value[index]
                    data.value[index] = data.value[target]
                    data.value[target] = temp
                }
                onMounted(async () => {
                    // 图片预览 
                    const lightbox = new PhotoSwipeLightbox({
                        gallery: "#dataList",
                        children: "a",
                        pswpModule: PhotoSwipe,
                    })
                    lightbox.init()

                    // 记录拖动排序
                    Sortable.create(document.getElementById("dataList"), {
                        animation: 150,
                        handle: ".handle",
                        ghostClass: "opacity-20",
                        onEnd: (e) => {
                            const temp = [...data.value]
                            const item = temp.splice(e.oldIndex, 1)[0]
                            temp.splice(e.newIndex, 0, item)
                            data.value = []
                            nextTick(() => {
                                data.value = temp
                            })
                        }
                    })
                    // 初始化并加载数据库
                    await initDB()
                    let res = await loadDB()
                    data.value = res
                    res.forEach(v => dataHash[v.content] = 1)
                    // 加载列名
                    res = localStorage.getItem(COLUMNS_STORAGE_KEY)
                    if (res) columns.value = JSON.parse(res)
                })
                // 全屏管理记录和页面不可见时停止扫描
                document.onvisibilitychange = async () => {
                    if (document.hidden) await stopScanner()
                }
                watch(fullscreen, async newVal => {
                    if (newVal) await stopScanner()
                })

                // 持久化列名
                watch(columns, (newVal) => {
                    localStorage.setItem(COLUMNS_STORAGE_KEY, JSON.stringify(newVal))
                }, {
                    deep: true
                })
                // 列名拖动排序
                watch(showColumns, async newVal => {
                    if (newVal) {
                        document.body.style.overflow = "hidden"
                        await nextTick()
                        Sortable.create(document.getElementById("columnsList"), {
                            animation: 150,
                            draggable: ".draggable",
                            handle: ".handle",
                            ghostClass: "opacity-20",
                            onEnd: e => {
                                const temp = [...columns.value]
                                const item = temp.splice(e.oldIndex, 1)[0]
                                temp.splice(e.newIndex, 0, item)
                                columns.value = []
                                nextTick(() => {
                                    columns.value = temp
                                })
                            }
                        })
                    } else document.body.style.overflow = ""
                })

                // 导出 xlsx
                async function exportXLSX() {
                    if (!data.value.length) return alert("无数据")
                    const workbook = new ExcelJS.Workbook()
                    const worksheet = workbook.addWorksheet("扫描记录")
                    const headers = ["序号", ...columns.value]
                    worksheet.columns = headers.map(h => ({
                        header: h,
                        key: h,
                        width: 15
                    }));
                    worksheet.getRow(1).font = {
                        bold: true
                    }
                    let rowIndex = 1
                    for (let i = 0; i < data.value.length; i += columns.value.length)
                        worksheet.addRow([rowIndex++, ...data.value.slice(i, i + columns.value.length).map(i => i.content)])
                    worksheet.columns.forEach((column, index) => {
                        let maxLength = 10
                        column.eachCell({
                            includeEmpty: true
                        }, (cell) => {
                            if (index === 0) cell.alignment = {
                                vertical: "middle",
                                horizontal: "center"
                            }
                            else cell.alignment = {
                                vertical: "middle",
                                horizontal: "left"
                            }
                            const cellValue = cell.value ? cell.value.toString() : ""
                            const currLength = cellValue.split("").reduce((acc, c) => acc + (c.charCodeAt(0) > 255 ? 2 : 1), 0)
                            if (currLength > maxLength) maxLength = currLength
                        })
                        column.width = maxLength + 2
                    })
                    const buffer = await workbook.xlsx.writeBuffer()
                    const blob = new Blob([buffer])
                    const a = document.createElement("a")
                    a.href = URL.createObjectURL(blob)
                    a.download = `扫描记录_${Date.now()}.xlsx`
                    a.click()
                }

                return {
                    data,
                    startScanner,
                    stopScanner,
                    toggleTorch,
                    move,
                    remove,
                    clearAll,
                    fullscreen,
                    showColumns,
                    columns,
                    exportXLSX
                }
            }
        }).mount("#app")
    </script>
    <script>
        if ("serviceWorker" in navigator)
            window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"))
    </script>
</body>
