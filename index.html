<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

    <title>Industrial Scanner</title>

    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="./assets/vconsole.min.js"></script>
    <script>new window.VConsole()</script>

    <style>
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
            touch-action: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none
        }

        @keyframes flash {
            0% {
                background: rgba(59, 130, 246, .6)
            }

            100% {
                background: transparent
            }
        }

        .flash {
            animation: flash .35s
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-white px-4 py-3 shadow flex justify-between items-center">

        <div>
            <h1 class="text-xl font-black text-blue-600">SCANNER PRO</h1>
            <p class="text-xs text-gray-400">Industrial Edition</p>
        </div>

        <button onclick="exportCSV()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold">
            导出 (<span id="count">0</span>)
        </button>

    </header>

    <section class="p-4 flex-shrink-0">

        <div class="relative">

            <div id="reader"></div>

            <div id="zoomUI" class="absolute top-3 right-3 bg-black/70 text-white text-xs px-2 py-1 rounded hidden">
                Zoom <span id="zoomVal">1</span>x
            </div>

            <div id="overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center text-white">

                <button onclick="startScanner()" class="bg-blue-500 p-5 rounded-full shadow-xl animate-bounce">

                    ▶

                </button>

            </div>

        </div>

        <div class="flex gap-2 mt-3">

            <button onclick="toggleTorch()" class="flex-1 bg-white py-2 rounded border text-sm">
                🔦 补光灯
            </button>

            <button onclick="clearAll()" class="flex-1 bg-white py-2 rounded border text-sm text-red-500">
                清空
            </button>

        </div>

    </section>

    <main class="flex-1 overflow-y-auto px-4 pb-10 no-scrollbar">

        <div id="list" class="space-y-2"></div>

    </main>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>

        /* ---------------------- */
        /* 全局状态 */
        /* ---------------------- */

        let scanner = null
        let history = []
        let lastScanTime = 0
        let scanLock = false

        let currentZoom = 1
        let pinchStart = 0
        let torch = false

        const SCAN_DEBOUNCE = 300
        const PAUSE_TIME = 200

        /* ---------------------- */
        /* 获取摄像头 track */
        /* ---------------------- */

        function getTrack() {

            const v = document.querySelector("#reader video")
            if (!v || !v.srcObject) return null

            return v.srcObject.getVideoTracks()[0]

        }

        /* ---------------------- */
        /* 启动扫描器 */
        /* ---------------------- */

        async function startScanner() {

            document.getElementById("overlay").style.display = "none"

            scanner = new Html5Qrcode("reader")

            await scanner.start(
                { facingMode: "environment" },
                {
                    fps: 30,
                    qrbox: (w, h) => ({ width: w * .7, height: h * .35 }),
                    aspectRatio: 1
                },
                onScan
            )

            enableAutoFocus()
            enableZoom()

        }

        /* ---------------------- */
        /* 自动对焦 */
        /* ---------------------- */

        async function enableAutoFocus() {

            const track = getTrack()
            if (!track) return

            const cap = track.getCapabilities()

            if (cap.focusMode) {

                try {
                    await track.applyConstraints({
                        advanced: [{ focusMode: "continuous" }]
                    })
                } catch (e) { }

            }

        }

        /* ---------------------- */
        /* 扫码处理 */
        /* ---------------------- */

        async function onScan(text) {

            const now = Date.now()

            if (now - lastScanTime < SCAN_DEBOUNCE) return

            lastScanTime = now

            if (historyHash[text]) return

            historyHash[text] = 1

            scanLock = true

            scanner.pause(true)

            addRecord(text)

            feedback()

            setTimeout(() => {
                scanner.resume()
                scanLock = false
            }, PAUSE_TIME)

        }

        /* ---------------------- */
        /* 去重 Hash */
        /* ---------------------- */

        const historyHash = {}

        /* ---------------------- */
        /* 新记录 */
        /* ---------------------- */

        function addRecord(code) {

            const item = {
                id: Date.now(),
                code,
                time: new Date().toLocaleTimeString()
            }

            history.unshift(item)

            appendDOM(item)

            updateCount()

        }

        /* ---------------------- */
        /* 增量 DOM */
        /* ---------------------- */

        function appendDOM(item) {

            const list = document.getElementById("list")

            const el = document.createElement("div")

            el.className = "bg-white p-3 rounded shadow flex justify-between"

            el.innerHTML = `
<div class="min-w-0">
<p class="font-mono font-bold truncate">${item.code}</p>
<p class="text-xs text-gray-400">${item.time}</p>
</div>
<button onclick="removeItem('${item.id}')" class="text-red-400">删</button>
`

            list.prepend(el)

        }

        /* ---------------------- */
        /* 删除 */
        /* ---------------------- */

        function removeItem(id) {

            history = history.filter(v => v.id != id)

            location.reload()

        }

        /* ---------------------- */
        /* 清空 */
        /* ---------------------- */

        function clearAll() {

            history = []
            Object.keys(historyHash).forEach(k => delete historyHash[k])

            document.getElementById("list").innerHTML = ""

            updateCount()

        }

        /* ---------------------- */
        /* 更新计数 */
        /* ---------------------- */

        function updateCount() {

            document.getElementById("count").innerText = history.length

        }

        /* ---------------------- */
        /* Torch */
        /* ---------------------- */

        async function toggleTorch() {

            const track = getTrack()
            if (!track) return

            const cap = track.getCapabilities()

            if (!cap.torch) {
                alert("设备不支持")
                return
            }

            torch = !torch

            await track.applyConstraints({
                advanced: [{ torch }]
            })

        }

        /* ---------------------- */
        /* Zoom */
        /* ---------------------- */

        function enableZoom() {

            const container = document.getElementById("reader")

            container.addEventListener("touchstart", e => {

                if (e.touches.length == 2) {

                    pinchStart = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY)

                }

            }, { passive: false })

            container.addEventListener("touchmove", async e => {

                if (e.touches.length != 2) return

                e.preventDefault()

                const track = getTrack()
                if (!track) return

                const cap = track.getCapabilities()
                if (!cap.zoom) return

                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY)

                let delta = (dist - pinchStart) / 200

                let next = currentZoom + delta

                next = Math.max(cap.zoom.min, Math.min(cap.zoom.max, next))

                await track.applyConstraints({
                    advanced: [{ zoom: next }]
                })

                currentZoom = next
                pinchStart = dist

                document.getElementById("zoomUI").classList.remove("hidden")
                document.getElementById("zoomVal").innerText = currentZoom.toFixed(1)

            }, { passive: false })

        }

        /* ---------------------- */
        /* 反馈 */
        /* ---------------------- */

        function feedback() {

            const beep = document.getElementById("beep")

            beep.play().catch(() => { })

            if (navigator.vibrate)
                navigator.vibrate(30)

            const r = document.getElementById("reader")

            r.classList.add("flash")

            setTimeout(() => r.classList.remove("flash"), 300)

        }

        /* ---------------------- */
        /* CSV */
        /* ---------------------- */

        function exportCSV() {

            if (!history.length) return alert("无数据")

            let csv = "\uFEFF序号,条码,时间\n"

            history.forEach((v, i) => {
                csv += `${i + 1},"${v.code}","${v.time}"\n`
            })

            const blob = new Blob([csv])

            const a = document.createElement("a")

            a.href = URL.createObjectURL(blob)

            a.download = "scan_export_" + Date.now() + ".csv"

            a.click()

        }

        /* ---------------------- */
        /* 页面隐藏自动暂停 */
        /* ---------------------- */

        document.addEventListener("visibilitychange", () => {

            if (!scanner) return

            if (document.hidden)
                scanner.pause()

            else
                scanner.resume()

        })

    </script>

</body>

</html>
